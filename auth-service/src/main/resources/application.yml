spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wifi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 20040903
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
server:
  port: 8381
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # 至少 256 位的密钥。生产环境放到 Nacos 配置中心覆盖此值。
  secret: YourSecretKey-AtLeast256Bits-ChangeInProduction!
  # token 过期时长，毫秒；默认 24 小时。
  expiration-millis: 86400000

verification-code:
  target-interval-seconds: 60
  target-daily-limit: 20
  ip-minute-limit: 10
  ip-daily-limit: 100
  code-length: 6
  expire-minutes: 5
  code-chars: ABCDEFGHJKLMNPQRSTUVWXYZ23456789
  cleanup-retention-days: 7
  cleanup-cron: 0 0 3 * * ?

