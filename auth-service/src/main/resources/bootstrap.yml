spring:
  application:
    name: auth-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
        # 共享配置：Nacos 控制台必须先建 wifi-jwt.yml（DEFAULT_GROUP），否则启动会 warn 但不致命。
        # auth-service 与 gateway-service 拉同一份，保证 jwt.secret 在签发端与解析端一致。
        extension-configs:
          - data-id: wifi-jwt.yml
            group: DEFAULT_GROUP
            refresh: true
