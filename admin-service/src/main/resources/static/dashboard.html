<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wifi Manager Admin Dashboard</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #17202a;
            --muted: #64748b;
            --line: #d8dee8;
            --accent: #1769aa;
            --ok: #18895a;
            --bad: #c24135;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            font-size: 14px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 28px;
            background: var(--panel);
            border-bottom: 1px solid var(--line);
        }

        h1, h2, p { margin: 0; }

        h1 { font-size: 20px; font-weight: 650; }
        h2 { font-size: 16px; font-weight: 650; }

        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 22px 24px 36px;
        }

        button, input, select {
            height: 34px;
            border-radius: 6px;
            font: inherit;
        }

        button {
            padding: 0 14px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            cursor: pointer;
        }

        button.secondary {
            background: #fff;
            color: var(--accent);
        }

        button.small {
            height: 30px;
            padding: 0 10px;
            font-size: 13px;
        }

        input, select {
            padding: 0 10px;
            border: 1px solid var(--line);
            background: #fff;
        }

        input { min-width: 240px; }

        input.small, select.small {
            height: 30px;
            min-width: 120px;
            font-size: 13px;
        }

        input.small[type="datetime-local"] { min-width: 180px; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filters {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px 16px;
            border-bottom: 1px solid var(--line);
            background: #fafbfc;
        }

        .filters label {
            color: var(--muted);
            font-size: 12px;
        }

        .filters .grow { flex: 1; }

        .status {
            color: var(--muted);
            font-size: 13px;
        }

        .grid {
            display: grid;
            gap: 14px;
        }

        .stats {
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            margin-bottom: 18px;
        }

        .metric {
            min-height: 86px;
            padding: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        .metric .label {
            color: var(--muted);
            font-size: 13px;
        }

        .metric .value {
            margin-top: 10px;
            font-size: 26px;
            font-weight: 700;
        }

        .columns { grid-template-columns: 1fr 1fr; }

        section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
        }

        section + section, .grid + .grid, .grid + section, section + .grid { margin-top: 14px; }

        .head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 11px 12px;
            border-bottom: 1px solid #edf0f5;
            text-align: left;
            white-space: nowrap;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            background: #fafbfc;
        }

        tr:last-child td { border-bottom: 0; }

        .table-wrap { overflow-x: auto; }

        .tag {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 12px;
            background: #edf2f7;
            color: #334155;
        }

        .tag.ok {
            background: #e7f6ee;
            color: var(--ok);
        }

        .tag.bad {
            background: #fdeceb;
            color: var(--bad);
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border: 1px solid #f2b8b5;
            border-radius: 8px;
            background: #fff4f3;
            color: var(--bad);
            display: none;
        }

        pre {
            margin: 0;
            max-height: 360px;
            overflow: auto;
            padding: 14px;
            background: #111827;
            color: #d1d5db;
            font-size: 12px;
            line-height: 1.5;
        }

        @media (max-width: 980px) {
            header { flex-direction: column; align-items: flex-start; }
            .stats, .columns { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <div>
        <h1>Wifi Manager Admin Dashboard</h1>
        <div class="status" id="statusText">等待刷新</div>
    </div>
    <div class="toolbar">
        <input id="keywordInput" placeholder="按用户名 / 设备编码 / 位置搜索">
        <button id="refreshButton">全部刷新</button>
        <button class="secondary" id="clearButton">清空</button>
    </div>
</header>

<main>
    <div class="error" id="errorBox"></div>

    <div class="grid stats">
        <div class="metric"><div class="label">用户总数</div><div class="value" id="totalUsers">-</div></div>
        <div class="metric"><div class="label">启用用户</div><div class="value" id="enabledUsers">-</div></div>
        <div class="metric"><div class="label">设备节点</div><div class="value" id="totalNodes">-</div></div>
        <div class="metric"><div class="label">在线节点</div><div class="value" id="onlineNodes">-</div></div>
        <div class="metric"><div class="label">当前客户端</div><div class="value" id="currentClients">-</div></div>
        <div class="metric"><div class="label">黑名单</div><div class="value" id="blacklistCount">-</div></div>
    </div>

    <div class="grid columns">
        <section>
            <div class="head">
                <h2>用户</h2>
                <span class="status" id="userPageMeta">-</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>账号</th>
                        <th>昵称</th>
                        <th>状态</th>
                        <th>创建时间</th>
                    </tr>
                    </thead>
                    <tbody id="userRows"></tbody>
                </table>
            </div>
        </section>

        <section>
            <div class="head">
                <h2>ESP32 节点</h2>
                <span class="status" id="devicePageMeta">-</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>编码</th>
                        <th>名称</th>
                        <th>IP</th>
                        <th>状态</th>
                        <th>客户端</th>
                    </tr>
                    </thead>
                    <tbody id="deviceRows"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="grid columns">
        <section>
            <div class="head">
                <h2>黑名单</h2>
                <span class="status" id="blacklistPageMeta">-</span>
            </div>
            <div class="filters">
                <input class="small" id="blacklistMac" placeholder="MAC">
                <input class="small" id="blacklistReason" placeholder="原因">
                <span class="grow"></span>
                <button class="small" data-target="blacklist">查询</button>
                <button class="small secondary" data-reset="blacklist">重置</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>MAC</th>
                        <th>原因</th>
                        <th>操作员</th>
                        <th>过期时间</th>
                        <th>创建时间</th>
                    </tr>
                    </thead>
                    <tbody id="blacklistRows"></tbody>
                </table>
            </div>
        </section>

        <section>
            <div class="head">
                <h2>会话</h2>
                <span class="status" id="sessionPageMeta">-</span>
            </div>
            <div class="filters">
                <input class="small" id="sessionMac" placeholder="MAC">
                <input class="small" id="sessionNodeId" placeholder="节点 ID" type="number">
                <input class="small" id="sessionUserId" placeholder="用户 ID" type="number">
                <select class="small" id="sessionStatus">
                    <option value="">全部状态</option>
                    <option value="1">在线</option>
                    <option value="0">离线</option>
                </select>
                <span class="grow"></span>
                <button class="small" data-target="session">查询</button>
                <button class="small secondary" data-reset="session">重置</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>SID</th>
                        <th>用户</th>
                        <th>节点</th>
                        <th>MAC</th>
                        <th>IP</th>
                        <th>状态</th>
                        <th>上/下行</th>
                        <th>登录时间</th>
                    </tr>
                    </thead>
                    <tbody id="sessionRows"></tbody>
                </table>
            </div>
        </section>
    </div>

    <section>
        <div class="head">
            <h2>流量日志</h2>
            <span class="status" id="trafficPageMeta">-</span>
        </div>
        <div class="filters">
            <input class="small" id="trafficMac" placeholder="MAC">
            <input class="small" id="trafficSessionId" placeholder="会话 ID" type="number">
            <input class="small" id="trafficDstIp" placeholder="目标 IP">
            <label>从</label>
            <input class="small" id="trafficStart" type="datetime-local">
            <label>到</label>
            <input class="small" id="trafficEnd" type="datetime-local">
            <span class="grow"></span>
            <button class="small" data-target="traffic">查询</button>
            <button class="small secondary" data-reset="traffic">重置</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>会话</th>
                    <th>MAC</th>
                    <th>目标 IP</th>
                    <th>端口</th>
                    <th>SNI</th>
                    <th>协议</th>
                    <th>上行</th>
                    <th>下行</th>
                    <th>时间</th>
                </tr>
                </thead>
                <tbody id="trafficRows"></tbody>
            </table>
        </div>
    </section>

    <section>
        <div class="head">
            <h2>接口原始返回</h2>
            <span class="status">/admin/dashboard</span>
        </div>
        <pre id="rawJson">{}</pre>
    </section>
</main>

<script>
    const $ = (id) => document.getElementById(id);

    function text(value) {
        return value === null || value === undefined || value === "" ? "-" : String(value);
    }

    function tagStatus(value) {
        const ok = Number(value) === 1;
        return `<span class="tag ${ok ? "ok" : "bad"}">${ok ? "启用/在线" : "禁用/离线"}</span>`;
    }

    function showError(message) {
        const box = $("errorBox");
        box.textContent = message;
        box.style.display = message ? "block" : "none";
    }

    async function requestJson(url) {
        const response = await fetch(url, { headers: { Accept: "application/json" } });
        if (!response.ok) {
            throw new Error(`${url} HTTP ${response.status}`);
        }
        const body = await response.json();
        if (body.code && body.code !== 200) {
            throw new Error(`${url} ${body.message || body.code}`);
        }
        return body.data;
    }

    function buildQuery(params) {
        const parts = ["current=1", "size=10"];
        Object.entries(params).forEach(([key, value]) => {
            if (value === null || value === undefined || value === "") return;
            parts.push(`${key}=${encodeURIComponent(value)}`);
        });
        return "?" + parts.join("&");
    }

    function renderStats(dashboard) {
        const userStats = dashboard.userStats || {};
        const deviceStats = dashboard.deviceStats || {};
        $("totalUsers").textContent = text(userStats.totalUsers);
        $("enabledUsers").textContent = text(userStats.enabledUsers);
        $("totalNodes").textContent = text(deviceStats.totalNodes);
        $("onlineNodes").textContent = text(deviceStats.onlineNodes);
        $("currentClients").textContent = text(deviceStats.currentClients);
        $("blacklistCount").textContent = text(deviceStats.blacklistCount);
    }

    function renderPage(page, metaId, rowsId, colspan, rowFn) {
        const records = page && page.records ? page.records : [];
        $(metaId).textContent = page ? `共 ${page.total} 条` : "-";
        $(rowsId).innerHTML = records.map(rowFn).join("") || `<tr><td colspan="${colspan}">暂无数据</td></tr>`;
    }

    async function loadDashboard() {
        const data = await requestJson("/admin/dashboard");
        renderStats(data || {});
        $("rawJson").textContent = JSON.stringify(data, null, 2);
    }

    async function loadUsers() {
        const keyword = $("keywordInput").value.trim();
        const data = await requestJson("/admin/users" + buildQuery({ keyword }));
        renderPage(data, "userPageMeta", "userRows", 5, (item) => `
            <tr>
                <td>${text(item.userId)}</td>
                <td>${text(item.username)}</td>
                <td>${text(item.nickname)}</td>
                <td>${tagStatus(item.status)}</td>
                <td>${text(item.createTime)}</td>
            </tr>`);
    }

    async function loadDevices() {
        const keyword = $("keywordInput").value.trim();
        const data = await requestJson("/admin/devices" + buildQuery({ keyword }));
        renderPage(data, "devicePageMeta", "deviceRows", 6, (item) => `
            <tr>
                <td>${text(item.nodeId)}</td>
                <td>${text(item.deviceCode)}</td>
                <td>${text(item.name)}</td>
                <td>${text(item.ip)}</td>
                <td>${tagStatus(item.status)}</td>
                <td>${text(item.currentClients)} / ${text(item.maxClients)}</td>
            </tr>`);
    }

    async function loadBlacklist() {
        const mac = $("blacklistMac").value.trim();
        const reason = $("blacklistReason").value.trim();
        const keyword = reason || mac;
        const data = await requestJson("/admin/devices/blacklist" + buildQuery({ keyword }));
        renderPage(data, "blacklistPageMeta", "blacklistRows", 6, (item) => `
            <tr>
                <td>${text(item.id)}</td>
                <td>${text(item.mac)}</td>
                <td>${text(item.reason)}</td>
                <td>${text(item.operatorId)}</td>
                <td>${text(item.expireTime)}</td>
                <td>${text(item.createTime)}</td>
            </tr>`);
    }

    async function loadSessions() {
        const params = {
            mac: $("sessionMac").value.trim(),
            nodeId: $("sessionNodeId").value.trim(),
            userId: $("sessionUserId").value.trim(),
            status: $("sessionStatus").value,
        };
        const data = await requestJson("/admin/sessions" + buildQuery(params));
        renderPage(data, "sessionPageMeta", "sessionRows", 8, (item) => `
            <tr>
                <td>${text(item.sessionId)}</td>
                <td>${text(item.userId)}</td>
                <td>${text(item.nodeId)}</td>
                <td>${text(item.mac)}</td>
                <td>${text(item.ip)}</td>
                <td>${tagStatus(item.status)}</td>
                <td>${text(item.bytesUp)} / ${text(item.bytesDown)}</td>
                <td>${text(item.loginTime)}</td>
            </tr>`);
    }

    async function loadTraffic() {
        const startLocal = $("trafficStart").value;
        const endLocal = $("trafficEnd").value;
        const params = {
            mac: $("trafficMac").value.trim(),
            sessionId: $("trafficSessionId").value.trim(),
            dstIp: $("trafficDstIp").value.trim(),
            startTime: startLocal ? `${startLocal}:00` : "",
            endTime: endLocal ? `${endLocal}:00` : "",
        };
        const data = await requestJson("/admin/traffic" + buildQuery(params));
        renderPage(data, "trafficPageMeta", "trafficRows", 10, (item) => `
            <tr>
                <td>${text(item.id)}</td>
                <td>${text(item.sessionId)}</td>
                <td>${text(item.mac)}</td>
                <td>${text(item.dstIp)}</td>
                <td>${text(item.dstPort)}</td>
                <td>${text(item.sni)}</td>
                <td>${text(item.protocol)}</td>
                <td>${text(item.bytesUp)}</td>
                <td>${text(item.bytesDown)}</td>
                <td>${text(item.logTime)}</td>
            </tr>`);
    }

    const loaders = {
        blacklist: loadBlacklist,
        session: loadSessions,
        traffic: loadTraffic,
    };

    const filterInputs = {
        blacklist: ["blacklistMac", "blacklistReason"],
        session: ["sessionMac", "sessionNodeId", "sessionUserId", "sessionStatus"],
        traffic: ["trafficMac", "trafficSessionId", "trafficDstIp", "trafficStart", "trafficEnd"],
    };

    async function runLoader(name) {
        showError("");
        try {
            await loaders[name]();
        } catch (error) {
            showError(error.message);
        }
    }

    function resetFilters(name) {
        filterInputs[name].forEach((id) => { $(id).value = ""; });
        runLoader(name);
    }

    async function refreshAll() {
        $("statusText").textContent = "刷新中...";
        showError("");
        try {
            await Promise.all([
                loadDashboard(),
                loadUsers(),
                loadDevices(),
                loadBlacklist(),
                loadSessions(),
                loadTraffic(),
            ]);
            $("statusText").textContent = `最后刷新：${new Date().toLocaleString()}`;
        } catch (error) {
            showError(error.message);
            $("statusText").textContent = "刷新失败";
        }
    }

    document.querySelectorAll("button[data-target]").forEach((btn) => {
        btn.addEventListener("click", () => runLoader(btn.dataset.target));
    });
    document.querySelectorAll("button[data-reset]").forEach((btn) => {
        btn.addEventListener("click", () => resetFilters(btn.dataset.reset));
    });
    document.querySelectorAll(".filters input, .filters select").forEach((el) => {
        el.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                const filtersDiv = el.closest(".filters");
                const target = filtersDiv.querySelector("button[data-target]");
                if (target) runLoader(target.dataset.target);
            }
        });
    });

    $("refreshButton").addEventListener("click", refreshAll);
    $("clearButton").addEventListener("click", () => {
        $("keywordInput").value = "";
        refreshAll();
    });
    $("keywordInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") refreshAll();
    });

    refreshAll();
</script>
</body>
</html>
