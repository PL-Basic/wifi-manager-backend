server:
  port: 8080
spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: device-service-route
          uri: lb://device-service
          predicates:
            - Path=/devices/**,/blacklist/**,/sessions/**,/traffic/**
        - id: admin-service-route
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
        - id: monitor-service-route
          uri: lb://monitor-service
          predicates:
            - Path=/rules/**,/alerts/**,/audits/**,/locations/**

jwt:
  # 必须与 auth-service 的 jwt.secret 保持一致；签发与解析使用同一密钥。
  secret: ${JWT_SECRET:change-me-in-local-development-only}
